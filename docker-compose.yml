version: '3.8'

services:
  backend:
    image: debian:bookworm-slim
    container_name: roco-backend
    restart: unless-stopped
    working_dir: /data
    volumes:
      - ./backend-go:/data
      - /etc/ssl/certs:/etc/ssl/certs:ro
    environment:
      SSL_CERT_DIR: /etc/ssl/certs
    command: ["/data/server"]
    networks:
      - roco-net

  nginx:
    image: nginx:alpine
    container_name: roco-nginx
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./backend-go/uploads:/data/uploads:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - roco-net
    depends_on:
      - backend

networks:
  roco-net:
    driver: bridge