# Development Docker Compose
# For production deployment, use docker-compose.prod.yml

version: '3.8'

services:
  backend:
    image: debian:bookworm-slim
    container_name: imgbed-backend-dev
    restart: unless-stopped
    working_dir: /data
    volumes:
      - ./backend-go:/data
      - /etc/ssl/certs:/etc/ssl/certs:ro
    environment:
      SSL_CERT_DIR: /etc/ssl/certs
      DB_CONNECTION: sqlite
      APP_PORT: 8000
      APP_URL: http://localhost:8000
      JWT_SECRET: dev-secret-change-me
    command: ["/data/server"]
    networks:
      - imgbed-net
    ports:
      - "8000:8000"

  nginx:
    image: nginx:alpine
    container_name: imgbed-nginx-dev
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./backend-go/uploads:/data/uploads:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - imgbed-net
    depends_on:
      - backend

networks:
  imgbed-net:
    driver: bridge